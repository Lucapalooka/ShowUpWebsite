name: Validate HTML
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run html-validate
        run: npx --yes html-validate@8.7.4 public/index.html
